name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Run tests
        run: ./mvnw -B test

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          retention-days: 7

  dependency-check:
    # Runs in parallel with `test` rather than after it: the two jobs check
    # different things (test correctness vs. known-vulnerable dependencies)
    # and neither result depends on the other, so there's no reason to make
    # PR feedback wait for both to finish serially.
    runs-on: ubuntu-latest
    # OWASP dependency-check downloads/updates the full NVD CVE database on
    # a cold cache. With an NVD API key that's usually a few minutes; without
    # one, NIST's unauthenticated rate limit can make it take a very long
    # time. The cache step below avoids re-downloading on every run, but the
    # very first run (or a cache miss after NVD schema changes) can still be
    # slow, so this job gets a generous timeout.
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '26'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Get current date
        id: get-date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Cache OWASP dependency-check NVD data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          # The NVD data is refreshed daily upstream and is independent of
          # our pom.xml, so key it on date, not on dependency hashes. Falling
          # back to the most recent same-OS cache still saves most of the
          # download even if today's exact key hasn't been written yet.
          key: dependency-check-data-${{ runner.os }}-${{ steps.get-date.outputs.date }}
          restore-keys: |
            dependency-check-data-${{ runner.os }}-

      - name: Check whether NVD_API_KEY secret is configured
        id: nvd-key-check
        run: |
          if [ -n "${{ secrets.NVD_API_KEY }}" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run OWASP dependency-check
        id: dependency-check
        # Without an API key, NIST's public rate limit can make a
        # cold-cache scan take a very long time or fail outright. Rather
        # than hard-failing every PR until a human adds the secret (see
        # README/PR description for setup instructions), we let the job
        # continue on error in that case so CI stays usable, but this is a
        # deliberately temporary crutch, not the intended steady state: once
        # NVD_API_KEY is set, failures here fail the build for real.
        continue-on-error: ${{ steps.nvd-key-check.outputs.present == 'false' }}
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -P security org.owasp:dependency-check-maven:check

      - name: Warn if scan was skipped-on-error due to missing NVD_API_KEY
        if: steps.nvd-key-check.outputs.present == 'false' && steps.dependency-check.outcome == 'failure'
        run: |
          echo "::warning::dependency-check failed or was too slow without an NVD_API_KEY secret. Add one at https://nvd.nist.gov/developers/request-an-api-key and set it as the NVD_API_KEY repo secret so this job runs reliably and its result is enforced."

      - name: Upload dependency-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30
          if-no-files-found: ignore
