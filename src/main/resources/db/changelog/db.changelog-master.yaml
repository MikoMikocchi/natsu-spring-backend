# Baseline schema for fresh databases. If a database already has this schema from Flyway,
# baseline Liquibase once (mark these changesets as applied) before starting the app.
databaseChangeLog:
  - include:
      file: changes/001-create-users.sql
      relativeToChangelogFile: true
  - include:
      file: changes/002-create-reader-settings.sql
      relativeToChangelogFile: true
  - include:
      file: changes/003-create-documents.sql
      relativeToChangelogFile: true
  - include:
      file: changes/004-create-dictionaries.sql
      relativeToChangelogFile: true
  - include:
      file: changes/005-create-dictionary-terms.sql
      relativeToChangelogFile: true
  - include:
      file: changes/006-create-user-dictionary-settings.sql
      relativeToChangelogFile: true
  - include:
      file: changes/007-create-document-search-text.sql
      relativeToChangelogFile: true
  - include:
      file: changes/008-enforce-document-storage-quota.sql
      relativeToChangelogFile: true
  - include:
      file: changes/009-create-oauth2-authorization-server.sql
      relativeToChangelogFile: true
