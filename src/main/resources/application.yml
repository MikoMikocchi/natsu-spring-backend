spring:
  application:
    name: natsu-spring-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/natsu_development
    username: natsu
    password: natsu
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
  jackson:
    property-naming-strategy: SNAKE_CASE
  servlet:
    multipart:
      max-file-size: 55MB
      max-request-size: 55MB
  mail:
    # Local dev default: Mailpit (see docker-compose.yml), a fake SMTP catcher with a web UI at
    # http://localhost:8025 -- no real credentials needed, nothing leaves the machine. Override
    # host/port/username/password via env vars for staging/production (a real SMTP provider).
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:false}

server:
  port: 3000

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    mail:
      enabled: false

natsu:
  storage-root: ${NATSU_STORAGE_ROOT:./storage}
  max-package-bytes: 52428800     # 50 MB; zip decompression caps are 2×/4× this (see NatsuProperties)
  max-storage-bytes-per-user: 524288000   # 500 MB
  # Native Android clients don't send an Origin header, so CORS is mostly moot for them; kept
  # permissive and toggleable in case a browser-based tool or a future web client needs it.
  cors-allowed-origins: "*"
  # CIDR ranges of reverse proxies/load balancers in front of this app. X-Forwarded-For is used for
  # per-IP rate limiting only when the direct TCP peer matches one of these ranges. Override via
  # NATSU_TRUSTED_PROXY_CIDRS (comma-separated) in deployments behind a real proxy/LB.
  trusted-proxy-cidrs: []
  # Deep-link/web URL used in password reset emails; "{token}" is replaced with the raw reset
  # token. Placeholder until a real web/deep-link frontend exists -- override with
  # NATSU_PASSWORD_RESET_URL_TEMPLATE in any real deployment.
  password-reset-url-template: ${NATSU_PASSWORD_RESET_URL_TEMPLATE:http://localhost:3000/reset-password?token={token}}
  # "From" address on outgoing mail (password reset, etc). Override in production via env var --
  # most SMTP providers reject mail sent from an address they haven't verified.
  mail-from: ${NATSU_MAIL_FROM:noreply@example.com}
  auth:
    access-token-ttl: 1h
    refresh-token-ttl: 365d
    reset-token-ttl: 2h
  oauth2:
    issuer: ${NATSU_OAUTH2_ISSUER:http://localhost:3000}
    client-id: natsu-mobile
    jwt:
      # PEM-encoded RSA keys (PKCS#8 private, X.509 public). Leave empty to auto-generate at startup (dev only).
      private-key: ${NATSU_OAUTH2_JWT_PRIVATE_KEY:}
      public-key: ${NATSU_OAUTH2_JWT_PUBLIC_KEY:}
  # Per-endpoint, per-dimension throttles (Bucket4j buckets, keyed and enforced in RateLimitFilter
  # and the auth/password controllers). Numbers mirror the sibling Rails backend's Rack::Attack config.
  rate-limit:
    login:
      capacity: 10
      window-seconds: 60
    login-email:
      capacity: 5
      window-seconds: 60
    register:
      capacity: 5
      window-seconds: 60
    password-reset:
      capacity: 5
      window-seconds: 60
    refresh:
      capacity: 10
      window-seconds: 60
    refresh-token:
      capacity: 5
      window-seconds: 60
    # Caffeine cache backing per-(category,key) Bucket4j instances in RateLimiter.
    bucket-cache:
      expire-after-access-minutes: 10
      maximum-size: 10000
  # In-process dictionary caches (invalidated via User.dictCacheVersion in cache keys).
  dictionary-cache:
    lookup:
      expire-after-write-minutes: 5
      maximum-size: 10000
    enabled-ids:
      expire-after-write-minutes: 30
      maximum-size: 10000
  # Thread pool for @Async book imports (bookImportExecutor bean).
  book-import-executor:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 50
  # Recovers documents left stuck in PENDING by a crash/restart mid-import (the in-memory async
  # task that was processing them is simply gone otherwise). Runs on startup and periodically;
  # see StaleImportRecoveryService.
  book-import-recovery:
    # Set to false to disable the scheduled scan entirely (e.g. in tests that don't want a
    # background job touching PENDING documents they didn't ask it to look at).
    enabled: true
    # How long a document may sit in PENDING before it's treated as stranded rather than a
    # genuinely slow, still-running import. Comfortably above realistic import durations.
    stale-after-minutes: 15
    # How often the periodic sweep runs, in addition to the one that always runs on startup.
    check-interval-minutes: 5
    # After this many recovery passes on the same document, stop retrying and leave it FAILED --
    # the original upload bytes are never persisted, so recovery can only fail the document
    # cleanly, never actually resume the parse; this cap just bounds how many times it gets
    # rescanned/re-logged before that terminal state is reached.
    max-attempts: 3
