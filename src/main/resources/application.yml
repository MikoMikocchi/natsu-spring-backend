spring:
  application:
    name: natsu-spring-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/natsu_development
    username: natsu
    password: natsu
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
  servlet:
    multipart:
      max-file-size: 55MB
      max-request-size: 55MB

server:
  port: 3000

natsu:
  storage-root: ${NATSU_STORAGE_ROOT:./storage}
  max-package-bytes: 52428800     # 50 MB
  max-storage-bytes-per-user: 524288000   # 500 MB
  # Native Android clients don't send an Origin header, so CORS is mostly moot for them; kept
  # permissive and toggleable in case a browser-based tool or a future web client needs it.
  cors-allowed-origins: "*"
  # Per-endpoint, per-dimension throttles (Bucket4j buckets, keyed and enforced in RateLimitFilter
  # and the auth/password controllers). Numbers mirror the sibling Rails backend's Rack::Attack config.
  rate-limit:
    login:
      capacity: 10
      window-seconds: 60
    login-email:
      capacity: 5
      window-seconds: 60
    register:
      capacity: 5
      window-seconds: 60
    password-reset:
      capacity: 5
      window-seconds: 60
    refresh:
      capacity: 10
      window-seconds: 60
    refresh-token:
      capacity: 5
      window-seconds: 60
